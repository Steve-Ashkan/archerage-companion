<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https://cdn.discordapp.com data:; connect-src 'self' https://*.supabase.co;">
  <title>ArcheRage Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Update banner — hidden until update is downloaded -->
  <div id="update-banner" style="display:none;">
    <span>⬆ Update ready — restart to apply</span>
    <button id="update-install-btn">Restart Now</button>
  </div>

  <h1>🔥 ArcheRage Companion</h1>
  <div id="content"></div>
  <button id="floatingTopBtn" type="button" aria-label="Back to top">TOP</button>

  <!-- Mail envelope — hidden until user has unread mail -->
  <button id="mail-envelope" aria-label="Open mail" style="display:none;">
    ✉
    <span id="mail-badge"></span>
  </button>

  <div id="tab-bar" class="tab-bar"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
